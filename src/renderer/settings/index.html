<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>MiniPet Settings</title>
    <link rel="stylesheet" href="settings.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="settings-container">
      <header class="settings-header">
        <h1>MiniPet Settings</h1>
        <p class="subtitle">Customize your desktop companion</p>
      </header>

      <!-- Pet Selection -->
      <section class="section">
        <h2>Choose Your Pet</h2>
        <div id="pet-gallery" class="pet-gallery">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- Pomodoro Timer -->
      <section class="section">
        <div class="section-header-row">
          <h2>Pomodoro Timer</h2>
          <div id="pomo-status" class="status-tag">Idle</div>
        </div>
        <div class="pomo-container">
          <div class="pomo-settings">
            <div class="pomo-input-group">
              <label>Focus (min)</label>
              <input type="number" id="pomo-focus-time" value="25" min="1" max="120" />
            </div>
            <div class="pomo-input-group">
              <label>Break (min)</label>
              <input type="number" id="pomo-break-time" value="5" min="1" max="60" />
            </div>
          </div>
          <div class="pomo-timer" id="pomo-display">25:00</div>
          <div class="pomo-controls">
            <button id="pomo-start-btn" class="primary-btn">Start</button>
            <button id="pomo-pause-btn" class="secondary-btn" style="display: none;">Pause</button>
            <button id="pomo-reset-btn" class="secondary-btn">Reset</button>
            <button id="pomo-standard-btn" class="secondary-btn">Standard</button>
          </div>
        </div>
      </section>

      <!-- Preferences -->
      <section class="section">
        <h2>Preferences</h2>
        <div class="settings-form">
          <!-- Scale -->
          <div class="setting-item">
            <label>Pet Scale</label>
            <div class="range-container">
              <input type="range" id="scale-range" min="0.5" max="2" step="0.1" value="2" />
              <span id="scale-value">2.0x</span>
            </div>
          </div>

          <!-- Enable Walking -->
          <div class="setting-item">
            <div class="setting-item-column">
              <label>Enable Walking</label>
              <p class="setting-hint">Allow your pet to wander around the screen.</p>
            </div>
            <label class="switch">
              <input type="checkbox" id="walking-toggle" checked />
              <span class="slider round"></span>
            </label>
          </div>

          <!-- Launch at Startup -->
          <div class="setting-item">
            <div class="setting-item-column">
              <label>Launch at Startup</label>
              <p class="setting-hint">Open MiniPet automatically when you log in.</p>
            </div>
            <label class="switch">
              <input type="checkbox" id="startup-toggle" />
              <span class="slider round"></span>
            </label>
          </div>

          <!-- Interaction -->
          <div class="setting-item">
            <label>Interaction</label>
            <button id="ping-pet-btn" class="secondary-btn">Ping Pet</button>
          </div>
        </div>
      </section>
    </div>

    <script type="module" src="settings.ts"></script>
  </body>
</html>
